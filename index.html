<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Story 🎉</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #0f0c29;
      color: white;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      -webkit-tap-highlight-color: transparent;
    }

    /* Progress bar */
    .progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      width: 0%;
      background: linear-gradient(90deg, #ff00cc, #00ffff);
      z-index: 999;
    }

    /* Slider */
    .slider {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Slide */
    .slide {
      position: absolute;
      width: 100%;
      height: 100%;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      text-align: center;
      padding: 20px;

      opacity: 0;
      transform: scale(0.9) translateY(40px);
      transition: all 0.7s ease;
    }

    /* Active slide */
    .slide.active {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Text */
    h1 {
      font-size: clamp(28px, 6vw, 50px);
      text-shadow: 0 0 20px #ff00cc;
      animation: floatText 3s ease-in-out infinite;
    }

    p {
      font-size: clamp(14px, 3.5vw, 18px);
      opacity: 0.8;
      margin-top: 10px;
      max-width: 90%;
    }

    @keyframes floatText {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Confetti */
    #confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="progress"></div>

<div class="slider">

  <section class="slide active">
    <h1>🎉 Happy Birthday 🎉</h1>
    <p>Hari ini hari spesial kamu ✨</p>
  </section>

  <section class="slide">
    <h1>💖 Special For You</h1>
    <p>Semoga semua impian kamu tercapai 💫</p>
  </section>

  <section class="slide">
    <h1>🔥 Stay Awesome</h1>
    <p>Tetap jadi diri kamu yang keren 😎</p>
  </section>

  <section class="slide">
    <h1>🎂 Final Wish</h1>
    <p>Semoga hidup kamu makin naik level 🚀</p>
  </section>

</div>

<canvas id="confetti"></canvas>

<script>
  let slides = document.querySelectorAll(".slide");
  let current = 0;
  let progress = document.querySelector(".progress");

  function showSlide(index) {
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");

    if (index === slides.length - 1) startConfetti();
  }

  /* AUTO SLIDE */
  let duration = 4000;
  let startTime = Date.now();

  function autoSlide() {
    let now = Date.now();
    let percent = ((now - startTime) / duration) * 100;
    progress.style.width = percent + "%";

    if (percent >= 100) {
      current++;
      if (current >= slides.length) current = 0;
      showSlide(current);
      startTime = Date.now();
    }

    requestAnimationFrame(autoSlide);
  }

  autoSlide();

  /* SWIPE */
  let startX = 0;

  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
      current = Math.min(current + 1, slides.length - 1);
    } else if (endX - startX > 50) {
      current = Math.max(current - 1, 0);
    }

    showSlide(current);
  });

  /* CONFETTI */
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  function randomColor() {
    const colors = ["#ff00cc", "#00ffff", "#ffcc00", "#00ff88"];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function createConfetti() {
    for (let i = 0; i < 120; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        size: Math.random() * 6 + 2,
        color: randomColor(),
        speed: Math.random() * 3 + 2
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pieces.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
      p.y += p.speed;
      if (p.y > canvas.height) p.y = -10;
    });
  }

  function startConfetti() {
    if (pieces.length === 0) {
      createConfetti();
      setInterval(drawConfetti, 20);
    }
  }
</script>

</body>
</html>
